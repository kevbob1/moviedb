apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "moviedb.fullname" . }}-db-migrate
  labels:
    {{- include "moviedb.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.migration.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.migration.activeDeadlineSeconds }}
  template:
    metadata:
      labels:
        {{- include "moviedb.labels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      containers:
        - name: db-migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["./bin/rails", "db:prepare"]
          env:
            - name: DATABASE_HOST
              value: {{ .Values.database.host | quote }}
            - name: DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "moviedb.fullname" . }}
                  key: DATABASE_USERNAME
            - name: RAILS_ENV
              value: {{ .Values.app.env.RAILS_ENV | quote }}
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "moviedb.fullname" . }}
                  key: DATABASE_PASSWORD
            - name: RAILS_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "moviedb.fullname" . }}
                  key: RAILS_MASTER_KEY
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: {{ include "moviedb.fullname" . }}
                  key: SECRET_KEY_BASE
