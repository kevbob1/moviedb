apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "moviedb.fullname" . }}
  labels:
    {{- include "moviedb.labels" . | nindent 4 }}
spec:
  {{- if not .Values.hpa.enabled }}
  replicas: 1
  {{- end }}
  selector:
    matchLabels:
      {{- include "moviedb.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "moviedb.labels" . | nindent 8 }}
    spec:
      initContainers:
        - name: wait-for-migrations
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              attempt=0
              until npm run db:migrate:status 2>/dev/null | grep -q "No pending migrations"; do
                attempt=$((attempt + 1))
                if [ $attempt -ge 60 ]; then
                  echo "Timed out waiting for migrations after 60 attempts"
                  exit 1
                fi
                echo "Pending migrations detected, waiting 5s (attempt $attempt/60)..."
                sleep 5
              done
              echo "No pending migrations, proceeding."
          env:
            - name: DATABASE_URL
              value: {{ .Values.database.url | quote }}
      containers:
        - name: moviedb
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: DATABASE_URL
              value: {{ .Values.database.url | quote }}
            - name: KAFKA_BROKERS
              value: {{ .Values.kafka.brokers | quote }}
            - name: NODE_ENV
              value: {{ .Values.app.env.NODE_ENV | quote }}
            - name: KAFKA_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "moviedb.fullname" . }}
                  key: KAFKA_USERNAME
            - name: KAFKA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "moviedb.fullname" . }}
                  key: KAFKA_PASSWORD
          livenessProbe:
            httpGet:
              path: /up
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /up
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.app.resources | nindent 12 }}
