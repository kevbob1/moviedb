# Deploy: helm secrets upgrade --install moviedb ./charts/moviedb -f charts/moviedb/values.yaml -f charts/moviedb/secrets.yaml

# Kubernetes Secret data merged from secrets.yaml
# To update secrets, edit charts/moviedb/secrets.yaml and re-run helm upgrade
secrets:
  database:
    password: CHANGE_ME
  rails:
    master_key: CHANGE_ME
    secret_key_base: CHANGE_ME

image:
  repository: moviedb
  tag: latest
  pullPolicy: IfNotPresent

app:
  port: 3000
  env:
    RAILS_ENV: production
    WEB_CONCURRENCY: "0"
    RAILS_MAX_THREADS: "3"
    SKIP_DB_PREPARE: "true"
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

database:
  host: database.postgres-postgresql
  port: 5432

# Kafka connection details (for internal sidecar or configmap)
kafka:
  enabled: false
  brokers: "kafka.database.svc.cluster.local:9092"
  username: "CHANGE_ME"
  password: "CHANGE_ME"

ingress:
  enabled: true
  className: nginx
  host: moviedb.k.p.do

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 65
  scaleDown:
    stabilizationWindowSeconds: 300
  scaleUp:
    stabilizationWindowSeconds: 60

pdb:
  enabled: true
  maxUnavailable: 1

migration:
  activeDeadlineSeconds: 120
  backoffLimit: 0
