apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "moviedb.kafka.fullname" . }}
  labels:
    {{- include "moviedb.labels" . | nindent 4 }}
    app.kubernetes.io/component: kafka
data:
  kafka-start.sh: |
    #!/bin/bash
    set -euo pipefail

    cat <<EOF >/tmp/kafka_jaas.conf
    KafkaServer {
      org.apache.kafka.common.security.scram.ScramLoginModule required
      username="${KAFKA_SCRAM_USERNAME}"
      password="${KAFKA_SCRAM_PASSWORD}";
    };
    EOF
    export KAFKA_OPTS="-Djava.security.auth.login.config=/tmp/kafka_jaas.conf"

    DATA_DIR=/var/kafka/data

    cat <<PROPS >/opt/kafka/config/server.properties
    process.roles=broker,controller
    node.id=0
    controller.quorum.voters=0@${POD_NAME}.{{ include "moviedb.kafka.headless" . }}.${NAMESPACE}.svc.cluster.local:9093
    listeners=SASL_PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
    advertised.listeners=SASL_PLAINTEXT://${POD_NAME}.{{ include "moviedb.kafka.headless" . }}.${NAMESPACE}.svc.cluster.local:9092
    listener.security.protocol.map=SASL_PLAINTEXT:SASL_PLAINTEXT,CONTROLLER:PLAINTEXT
    controller.listener.names=CONTROLLER
    inter.broker.listener.name=SASL_PLAINTEXT
    sasl.enabled.mechanisms=SCRAM-SHA-512
    sasl.mechanism.inter.broker.protocol=SCRAM-SHA-512
    listener.name.sasl_plaintext.scram-sha-512.sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required username="${KAFKA_SCRAM_USERNAME}" password="${KAFKA_SCRAM_PASSWORD}";
    offsets.topic.replication.factor=1
    transaction.state.log.replication.factor=1
    transaction.state.log.min.isr=1
    log.dirs=${DATA_DIR}
    PROPS

    cat <<CLIENT >/tmp/client.properties
    security.protocol=SASL_PLAINTEXT
    sasl.mechanism=SCRAM-SHA-512
    sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required username="${KAFKA_SCRAM_USERNAME}" password="${KAFKA_SCRAM_PASSWORD}";
    CLIENT

    /opt/kafka/bin/kafka-storage.sh format \
      --ignore-formatted \
      --add-scram "SCRAM-SHA-512=[name=${KAFKA_SCRAM_USERNAME},password=${KAFKA_SCRAM_PASSWORD}]" \
      --cluster-id "${CLUSTER_ID}" \
      --config /opt/kafka/config/server.properties

    /opt/kafka/bin/kafka-server-start.sh /opt/kafka/config/server.properties &
    KAFKA_PID=$!

    KAFKA_READY=0
    for i in $(seq 1 30); do
      if /opt/kafka/bin/kafka-topics.sh --list \
          --bootstrap-server localhost:9092 \
          --command-config /tmp/client.properties \
          > /dev/null 2>&1; then
        KAFKA_READY=1
        break
      fi
      sleep 2
    done

    if [ "${KAFKA_READY}" -eq 0 ]; then
      echo "ERROR: Kafka broker did not become ready in time" >&2
      kill "${KAFKA_PID}"
      exit 1
    fi

    for TOPIC in moviedb.movies.sync moviedb.audit; do
      /opt/kafka/bin/kafka-topics.sh --create \
        --topic "${TOPIC}" \
        --bootstrap-server localhost:9092 \
        --partitions 1 \
        --replication-factor 1 \
        --if-not-exists \
        --command-config /tmp/client.properties
      echo "Topic ready: ${TOPIC}"
    done

    wait "${KAFKA_PID}"
