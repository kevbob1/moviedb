services:
  postgres:
    image: postgres:18.4
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg-data:/var/lib/postgresql
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 5s

  migrate:
    build:
      context: .
      target: development
    command: ["npx", "prisma", "migrate", "deploy"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src:/app/src:rw
      - ./prisma:/app/prisma:rw
      - ./package.json:/app/package.json:ro
      - ./package-lock.json:/app/package-lock.json:ro
      - ./tsconfig.json:/app/tsconfig.json:ro
      - ./prisma.config.ts:/app/prisma.config.ts:ro
    restart: "no"

  web:
    build:
      context: .
      target: development
    command: ["npm", "run", "dev"]
    env_file: .env
    ports:
      - "127.0.0.1:${HOST_PORT:-${PORT:-3000}}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./src:/app/src:rw
      - ./prisma:/app/prisma:rw
      - ./public:/app/public:ro
      - ./package.json:/app/package.json:ro
      - ./package-lock.json:/app/package-lock.json:ro
      - ./tsconfig.json:/app/tsconfig.json:ro
      - ./tsconfig.test.json:/app/tsconfig.test.json:ro
      - ./prisma.config.ts:/app/prisma.config.ts:ro
      - ./next.config.ts:/app/next.config.ts:ro
      - ./postcss.config.mjs:/app/postcss.config.mjs:ro
      - ./eslint.config.mjs:/app/eslint.config.mjs:ro
      - ./jest.config.ts:/app/jest.config.ts:ro
      - node_modules:/app/node_modules
    restart: unless-stopped

volumes:
  pg-data:
  node_modules:
