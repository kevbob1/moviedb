apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "moviedb.fullname" . }}-debug
  labels:
    {{- include "moviedb.labels" . | nindent 4 }}
    app.kubernetes.io/component: debug
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "moviedb.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: debug
  template:
    metadata:
      labels:
        {{- include "moviedb.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: debug
    spec:
      containers:
        - name: debug
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/bin/sleep", "infinity"]
          envFrom:
            - configMapRef:
                name: {{ include "moviedb.fullname" . }}-env
            - secretRef:
                name: {{ include "moviedb.fullname" . }}
          env:
            - name: DATABASE_URL
              value: postgresql://{{ .Values.secrets.database.username }}:{{ .Values.secrets.database.password }}@postgres-postgresql.database:5432/moviedb_production