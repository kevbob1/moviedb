# Deploy: helm secrets upgrade --install moviedb ./charts/moviedb -f charts/moviedb/values.yaml -f charts/moviedb/values-secrets.yaml

# Kubernetes Secret data merged from values-secrets.yaml
# To update secrets, edit charts/moviedb/values-secrets.yaml and re-run helm upgrade
secrets:
  database:
    username: postgres
    password: CHANGE_ME
  tmdb_api_key: CHANGE_ME
  cronSecret: CHANGE_ME

jellyfin:
  url: "http://jellyfin.pd.o:8096"

image:
  repository: registry.k.pd.o/moviedb
  tag: 1.0 
  pullPolicy: IfNotPresent

app:
  port: 3000
  baseUrl: "https://on-jf.p.drule.org"
  env:
    NODE_ENV: production
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

notifications:
  smtp:
    host: "smtp.gmail.com"
    port: "587"
  email: "kev+onjf@drule.org"
  cron:
    schedule: "0 8 * * *"

database:
  url: ""

ingress:
  enabled: true
  className: nginx
  hosts:
    - moviedb.k.pd.o
    - on-jf.p.drule.org

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 65
  scaleDown:
    stabilizationWindowSeconds: 300
  scaleUp:
    stabilizationWindowSeconds: 60

pdb:
  enabled: true
  maxUnavailable: 1

migration:
  activeDeadlineSeconds: 120
  backoffLimit: 0
