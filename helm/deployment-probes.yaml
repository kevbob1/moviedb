spec:
  containers:
    - name: moviedb
      livenessProbe:
        httpGet:
          path: /api/health/live
          port: 3000
        initialDelaySeconds: 30
        periodSeconds: 10
      readinessProbe:
        httpGet:
          path: /api/health/readiness
          port: 3000
        initialDelaySeconds: 5
        periodSeconds: 5